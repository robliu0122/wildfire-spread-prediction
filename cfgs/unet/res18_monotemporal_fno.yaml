# FNO bottleneck variant. Identical to res18_monotemporal.yaml (Phase 1/2B recipe)
# except the bottleneck conv is replaced by an FNO block. Only difference vs baseline.
seed_everything: 0
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.001
    weight_decay: 1.0e-4
lr_scheduler:
  class_path: torch.optim.lr_scheduler.CosineAnnealingLR
  init_args:
    T_max: 100
model:
  class_path: models.FNOSMPModel
  init_args:
    encoder_name: resnet18
    n_channels: 40
    flatten_temporal_dimension: true
    pos_class_weight: 236
    loss_function: Focal
    fno_stage: 5        # 5 = bottleneck (512 ch, 4x4). 3 = 16x16, 2 = 32x32.
    fno_modes_h: 2      # 4x4 bottleneck: full mixing is mh=2 (H//2), mw=3 (W//2+1)
    fno_modes_w: 3
    n_fno_blocks: 1

do_train: true
do_predict: false
do_test: true
