# pytorch_lightning==2.0.1
# Phase 2: + cosine LR + weight_decay 1e-4
seed_everything: 0
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.001
    weight_decay: 1.0e-4
lr_scheduler:
  class_path: torch.optim.lr_scheduler.CosineAnnealingLR
  init_args:
    T_max: 100
model:
  class_path: models.SMPModel
  init_args:
    encoder_name: resnet18
    n_channels: 40
    flatten_temporal_dimension: true
    pos_class_weight: 236
    loss_function: Focal

do_train: true
do_predict: false
do_test: true
